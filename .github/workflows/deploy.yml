name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # daily rebuild so the Music agenda stays a rolling 30-day window
    - cron: '0 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Refresh the Music agenda from partyflock.nl; if the scrape fails,
      # the committed partyflock-events.json ships instead.
      - run: node scripts/scrape-partyflock.mjs || echo "scrape failed — shipping committed agenda"

      # The site is served from nergy101.github.io/fable-angular-threejs/
      - run: npx ng build --base-href /fable-angular-threejs/

      # GitHub Pages has no SPA fallback: serve index.html as the 404 page
      # so deep links like /learn/cameras survive a refresh.
      - run: cp dist/vector-atelier/browser/index.html dist/vector-atelier/browser/404.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/vector-atelier/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
